<!DOCTYPE html>
<html>
<head>
    <title>PDF Unlocker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>PDF Password Remover</h1>

    <input type="file" id="pdfFile" accept=".pdf">

    <input
        type="password"
        id="password"
        placeholder="Enter PDF Password"
    >

    <button id="unlockBtn">
        Unlock PDF
    </button>

    <p id="status"></p>
</div>

<script src="script.js"></script>

</body>
</html>
